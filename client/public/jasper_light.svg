<svg width="640" height="200" viewBox="0 0 640 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="640" height="200" fill="#ffffff"/>

  <!-- Oval badge -->
  <ellipse cx="100" cy="100" rx="90" ry="90" fill="#1b3669"/>

  <!-- J letter -->
  <text x="68" y="136"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="112"
    font-weight="700"
    fill="#ffffff"
    letter-spacing="-2">J</text>

  <!-- Calibration tick marks -->
  <line x1="108" y1="58" x2="148" y2="58" stroke="#7faad4" stroke-width="4" stroke-linecap="round"/>
  <line x1="108" y1="73" x2="148" y2="73" stroke="#7faad4" stroke-width="4" stroke-linecap="round"/>
  <line x1="108" y1="88" x2="148" y2="88" stroke="#7faad4" stroke-width="4" stroke-linecap="round"/>
  <line x1="108" y1="103" x2="148" y2="103" stroke="#7faad4" stroke-width="4" stroke-linecap="round"/>
  <line x1="108" y1="118" x2="148" y2="118" stroke="#7faad4" stroke-width="4" stroke-linecap="round"/>

  <!-- JASPER wordmark -->
  <text x="210" y="108"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="80"
    font-weight="700"
    fill="#1b3669"
    letter-spacing="4">JASPER</text>

  <!-- Rule line -->
  <line x1="210" y1="120" x2="628" y2="120" stroke="#1b3669" stroke-width="1.5"/>

  <!-- Acronym subtitle -->
  <text x="210" y="143"
    font-family="Arial, Helvetica, sans-serif"
    font-size="12.5"
    font-weight="400"
    fill="#7faad4"
    letter-spacing="2.2">JOSTS AUTOMATED SYSTEM FOR PRECISION</text>
  <text x="210" y="161"
    font-family="Arial, Helvetica, sans-serif"
    font-size="12.5"
    font-weight="400"
    fill="#7faad4"
    letter-spacing="2.2">ENGINEERING REPORTS</text>
</svg>
