services:

  server:
    image: ghcr.io/ankush109/josts-server:latest
    ports:
      - "5000:5000"
    env_file:
      - ./.env
    restart: unless-stopped

  worker:
    image: ghcr.io/ankush109/josts-worker:latest
    env_file:
      - ./.env
    restart: unless-stopped

  ngrok:
    image: ngrok/ngrok:latest
    restart: unless-stopped
    command: http server:5000 --url=nonconvective-noncontroversial-gwen.ngrok-free.dev
    env_file:
      - ./.env
    depends_on:
      - server
